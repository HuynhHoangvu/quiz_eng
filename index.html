let questions = [];
let current = 0;
let answered = [];
let score = 0;
let mode = 'all';
let showResult = false;
let reviewMode = false;

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startQuiz(m) {
  mode = m;
  if(m==='random') {
    questions = shuffle(ALL).slice(0, 20);
  } else {
    questions = [...ALL];
  }
  current = 0;
  answered = new Array(questions.length).fill(null);
  score = 0;
  showResult = false;
  reviewMode = false;
  render();
}

function selectAnswer(idx) {
  if(answered[current] !== null) return;
  answered[current] = idx;
  if(idx === questions[current].a) score++;
  render();
}

function go(dir) {
  current = Math.max(0, Math.min(questions.length-1, current+dir));
  render();
}

function finish() {
  showResult = true;
  reviewMode = false;
  render();
}

function retryWrong() {
  const wrongItems = questions.map((q,i)=>({q,i,ans:answered[i]})).filter(x=>x.ans!==x.q.a);
  if(wrongItems.length === 0) {
    return;
  }
  questions = wrongItems.map(item => item.q);
  current = 0;
  answered = new Array(questions.length).fill(null);
  score = 0;
  showResult = false;
  reviewMode = true;
  render();
}

function renderHome() {
  return `
    <div class="hero">
      <div class="brand-bar">
        <div class="brand-logo">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M32 2C16.5 2 4 14.5 4 30s12.5 28 28 28 28-12.5 28-28S47.5 2 32 2zm0 4c8.8 0 16.8 4.7 21.3 12.1l-5.7 2c-3.3-6.3-9.8-10.1-15.6-10.1-9.9 0-18.1 8.1-18.1 18.1 0 9.9 8.1 18.1 18.1 18.1 5.7 0 11-2.8 14.4-7.5l3.2 1.1C44.3 53.5 38.4 56 32 56 18.7 56 8 45.3 8 32S18.7 8 32 8z"/>
            <path d="M36.8 17.3c.7.2 1.1.9 1 1.6l-.7 7.1 6.3 2.2c.9.3 1.5 1.1 1.4 2-.1.9-.8 1.6-1.7 1.7l-5.4.7 2.5 3.5c.5.7.3 1.6-.4 2.1-.7.5-1.6.3-2.1-.4l-4-5.6-3.9.5c-.8.1-1.5-.4-1.7-1.2s.2-1.7.9-2.1l9.5-4.1-1.4-6.7c-.2-.8.3-1.6 1.1-1.8z"/>
          </svg>
        </div>
        <div class="brand-name">Fly Immigration</div>
      </div>
      <div class="title hero-title">Fly Immigration Quiz</div>
      <p class="hero-subtitle">Màu sắc hài hòa với logo vàng sang trọng, trải nghiệm luyện đề thú vị và chuyên nghiệp.</p>
      <div class="hero-actions">
        <button class="btn primary" onclick="startQuiz('all')">Làm tất cả (${ALL.length} câu)</button>
        <button class="btn" onclick="startQuiz('random')">Ngẫu nhiên 20 câu</button>
      </div>
    </div>
  `;
}

function renderQuiz() {
  const q = questions[current];
  const ans = answered[current];
  const pct = Math.round(((current + (ans!==null?1:0)) / questions.length) * 100);
  const done = answered.filter(x=>x!==null).length;

  let opts = q.o.map((o,i) => {
    let cls = 'opt';
    if(ans !== null) {
      if(i === q.a) cls += ' correct';
      else if(i === ans && ans !== q.a) cls += ' wrong';
    }
    return `<button class="${cls}" onclick="selectAnswer(${i})" ${ans!==null?'disabled':''}>${String.fromCharCode(65+i)}. ${o}</button>`;
  }).join('');

  let feedback = '';
  if(ans !== null) {
    if(ans === q.a) feedback = `<div class="feedback ok">✓ Đúng rồi!</div>`;
    else feedback = `<div class="feedback no">✗ Sai. Đáp án đúng: ${String.fromCharCode(65+q.a)}</div>`;
  }

  const allAnswered = answered.every(x=>x!==null);

  return `
    <div class="header">
      <span class="counter">Câu ${current+1}/${questions.length}</span>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="counter">Đúng: ${score}/${done}</span>
    </div>
    <div class="q-card">
      <div class="q-text"><b>Câu ${current+1}.</b> ${q.q}</div>
      ${feedback}
      ${opts}
    </div>
    <div class="nav">
      <button class="btn" onclick="go(-1)" ${current===0?'disabled':''}>← Trước</button>
      <button class="btn" onclick="go(1)" ${current===questions.length-1?'disabled':''}>Tiếp →</button>
      ${allAnswered ? `<button class="btn primary" onclick="finish()">Xem kết quả</button>` : ''}
    </div>
    <div style="margin-top:1rem;display:flex;gap:4px;flex-wrap:wrap">
      ${answered.map((a,i)=>`<button onclick="current=${i};render()" style="width:32px;height:32px;border-radius:6px;border:0.5px solid var(--color-border-secondary);font-size:12px;cursor:pointer;background:${i===current?'#7F77DD':a===null?'transparent':a===questions[i].a?'#EAF3DE':'#FCEBEB'};color:${i===current?'#fff':'var(--color-text-primary)'};font-family:var(--font-sans)">${i+1}</button>`).join('')}
    </div>
  `;
}

function renderResult() {
  const total = questions.length;
  const pct = Math.round((score/total)*100);
  let badge = pct>=80?'🏆':pct>=60?'👍':pct>=40?'😐':'📖';
  let msg = pct>=80?'Xuất sắc!':pct>=60?'Khá tốt!':pct>=40?'Cần ôn thêm':'Hãy ôn tập thêm nhé';

  let wrongItems = questions.map((q,i)=>({q,i,ans:answered[i]})).filter(x=>x.ans!==x.q.a);

  let review = wrongItems.length === 0 ? '<p style="color:var(--color-text-secondary);font-size:14px">Bạn làm đúng tất cả! 🎉</p>' :
    wrongItems.map(({q,i,ans})=>`
      <div class="review-item">
        <div class="review-q">Câu ${i+1}: ${q.q}</div>
        <div class="review-ans">Bạn chọn: <span class="no">${String.fromCharCode(65+ans)}. ${q.o[ans]}</span></div>
        <div class="review-ans">Đáp án đúng: <span class="ok">${String.fromCharCode(65+q.a)}. ${q.o[q.a]}</span></div>
      </div>
    `).join('');

  return `
    <div class="result">
      <div class="badge">${badge}</div>
      <h2>${msg}</h2>
      <p>Bạn đúng <b>${score}/${total}</b> câu (${pct}%)</p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:2rem">
        <button class="btn primary" onclick="startQuiz('all')">Làm lại (tất cả)</button>
        <button class="btn" onclick="startQuiz('random')">Ngẫu nhiên 20 câu</button>
        ${wrongItems.length>0 ? `<button class="btn" onclick="retryWrong()">Làm lại câu sai</button>` : ''}
        <button class="btn" onclick="questions=[...ALL];current=0;showResult=false;render()">Xem lại câu hỏi</button>
      </div>
    </div>
    ${wrongItems.length>0?`<div style="font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:12px">Câu sai (${wrongItems.length}):</div>`:''}
    ${review}
  `;
}

function render() {
  const app = document.getElementById('app');
  if(questions.length === 0) { app.innerHTML = renderHome(); return; }
  if(showResult) { app.innerHTML = renderResult(); return; }
  app.innerHTML = renderQuiz();
}

render();
</script>
</body>
</html>
